<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BIENVENIDO</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f9f9f9;
        }

        .container {
            width: 350px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #ccc;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            text-align: left;
        }

       input[type="text"], input[type="password"] {
            width: 95%;
            padding: 8px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        input:focus {
            outline: none;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px 20px;
            font-size: 14px;
            background-color: #337ab7;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #23527c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>BIENVENIDO</h2>
        <label for="username">Nombre de Usuario:</label>
        <input type="text" id="username" placeholder="Escribe tu usuario" required autocomplete="off">
        <button id="enterButton">ENTRAR</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/11.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.10.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBVZaysx9d6u6P13DYINPtcinpf79Sgx4U",
            authDomain: "juego001-469b6.firebaseapp.com",
            databaseURL: "https://juego001-469b6-default-rtdb.firebaseio.com",
            projectId: "juego001-469b6",
            storageBucket: "juego001-469b6.appspot.com",
            messagingSenderId: "528847999661",
            appId: "1:528847999661:web:6085a104fe64262a042c24"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        async function handleLogin() {
            const button = document.getElementById('enterButton');
            const usernameInput = document.getElementById('username');
            const username = usernameInput.value.trim().toLowerCase();

            if (username === '') {
                alert('Por favor, ingresa tu nombre de usuario.');
                return;
            }

            button.disabled = true;
            button.textContent = 'Verificando...';

            try {
                const snapshot = await database.ref('usuarios/' + username).once('value');

                if (!snapshot.exists()) {
                    alert('Usuario no registrado. Por favor verifica tu nombre.');
                    button.disabled = false;
                    button.textContent = 'ENTRAR';
                    return;
                }

                const userData = snapshot.val();

                if (!userData.password) {
                    // Primera vez: crear contraseña
                    let newPassword = prompt("Primera vez que ingresas. Crea tu contraseña:");
                    if (!newPassword) {
                        alert("Debes ingresar una contraseña.");
                        button.disabled = false;
                        button.textContent = 'ENTRAR';
                        return;
                    }

                    await database.ref('usuarios/' + username + '/password').set(newPassword);
                    alert("Contraseña creada correctamente. Ahora podrás ingresar con ella.");
                    // Redirigir a la página principal
                    localStorage.setItem('ActualUs', username);
                    window.location.href = 'Menu/Juegos.html';
                } else {
                    // Ya tiene contraseña: solicitar contraseña existente
                    let passwordInput = prompt("Ingresa tu contraseña:");
                    if (passwordInput !== userData.password) {
                        alert("Contraseña incorrecta.");
                        button.disabled = false;
                        button.textContent = 'ENTRAR';
                        return;
                    }
                    // Contraseña correcta: ingreso permitido
                    localStorage.setItem('ActualUs', username);
                    window.location.href = 'Menu/Juegos.html';
                }

            } catch (error) {
                alert('Error al verificar usuario: ' + error.message);
                button.disabled = false;
                button.textContent = 'ENTRAR';
            }
        }

        document.getElementById('enterButton').addEventListener('click', handleLogin);

        document.getElementById('username').addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                handleLogin();
            }
        });

        document.getElementById('username').focus();
    </script>
</body>
</html>
